<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuru Camp</title>

  <!-- Theme Sync -->
  <link rel="stylesheet" href="../css/index.css" />
  <link rel="stylesheet" href="../css/light-dark-theme.css" />
  <link rel="icon" href="../favicon.ico" type="image/x-icon" />

  <script>
    (() => {
      const mode = localStorage.getItem("theme-mode") || "light";
      const variant = localStorage.getItem("theme-variant") || "default";
      document.documentElement.className = "";
      document.write(`<body class="${mode} ${variant}">`);
    })();
  </script>

  <style>
    main {
      padding: 1rem;
      max-width: 960px;
      margin: auto;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.2rem;
    }

    .season-title {
      font-size: 1.2rem;
      color: var(--subtitle-color);
      margin-top: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .episode-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .episode-button {
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 1rem;
      color: var(--text-color);
      background: var(--card-bg);
      transition: 0.2s ease;
      min-width: 40px;
    }

    .episode-button:hover {
      background: var(--hover-bg);
      color: var(--accent-color);
    }

    .episode-button.active {
      background: var(--accent-color);
      color: #fff;
    }

    iframe {
      width: 100%;
      max-width: 640px;
      height: 360px;
      border: none;
      border-radius: 16px;
      margin: 20px auto 40px;
      display: block;
      background-color: var(--card-bg);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<main>
  <h1>Yuru Camp</h1>

  <!-- Player -->
  <iframe id="player" allowfullscreen></iframe>

  <!-- Nút chọn tập -->
  <div id="episodes-container"></div>
</main>

<script>
  const url = new URLSearchParams(location.search);
  const ep = parseInt(url.get("ep")) || 0;

  const allSeasons = {

s1:{
name:"Mùa 1",
episodes:12,
links:[
["https://short.icu/bD8hdiK7Y"],
["https://short.icu/rfFEx7gE6"],
["https://short.icu/82LbuVwou"],
["https://short.icu/gwS1nTlIX"],
["https://short.icu/V9q5buBpr"],
["https://short.icu/2XjfR5OJi"],
["https://short.icu/XgPJCXZx-"],
["https://short.icu/Ndljnhpnm"],
["https://short.icu/UOFgckFNe"],
["https://short.icu/_bDYFUvujn"],
["https://short.icu/hleYeDMKW"],
["https://short.icu/fwNvUebbX"],
]
},

s2:{
name:"Mùa 2",
episodes:13,
links:[
["https://short.icu/AJwMThOBG"],
["https://short.icu/sjMWnjXOU"],
["https://short.icu/-VCi1F_5y"],
["https://short.icu/wZT2VnAlm"],
["https://short.icu/L2O9a-0o1"],
["https://short.icu/Q7FA2k7ps"],
["https://short.icu/k1TC1P2dH"],
["https://short.icu/CFJKc25Kq"],
["https://short.icu/1GahlXsEu"],
["https://short.icu/S5govsh1I"],
["https://short.icu/CyOS2ivwr"],
["https://short.icu/RvSKipsbJ"],
["https://short.icu/Wxcb72nw6"],
]
},

s3:{
name:"Mùa 3",
episodes:12,
links:[
["https://short.icu/ibCW-gx2H"],
["https://short.icu/mWioPgriT"],
["https://short.icu/GdsZArJ_N"],
["https://short.icu/kMI-eSvZQ"],
["https://short.icu/VLNfWMGQK"],
["https://short.icu/4SMDKwrl9"],
["https://short.icu/anSrb8cu-"],
["https://short.icu/lQ3oDEGh2"],
["https://short.icu/GuIWpgzru"],
["https://short.icu/-v1RMKZfC"],
["https://short.icu/8aDGAALmm"],
["https://short.icu/NXl3lxZXC"],
      ]
    }
  };

  const container = document.getElementById("episodes-container");

  for (const [key, seasonData] of Object.entries(allSeasons)) {
    const div = document.createElement("div");

    const title = document.createElement("div");
    title.className = "season-title";
    title.textContent = seasonData.name;
    div.appendChild(title);

    const group = document.createElement("div");
    group.className = "episode-buttons";

    for (let i = 0; i < seasonData.episodes; i++) {
      const btn = document.createElement("a");
      btn.className = "episode-button";
      if (key === "s1" && i === ep) btn.classList.add("active");

      btn.textContent = i + 1;
      btn.href = `?ep=${i}`;

      group.appendChild(btn);
    }

    div.appendChild(group);
    container.appendChild(div);
  }

  const currentLink = allSeasons.s1.links[ep] || "";
  const player = document.getElementById("player");

  if (currentLink && currentLink !== "$$") {
    player.src = currentLink;
  } else {
    player.style.display = "none";
  }
</script>

<!-- Theme Sync JS -->
<script src="../js/index.js" defer></script>
</body>
</html>
