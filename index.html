<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All That Anime</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/light-dark-theme.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body class="light default"> 

<div class="theme-controls">
  <select id="themeSelect" title="Chọn chủ đề">
    <option value="default">Default</option>
    <option value="miku">Miku</option>
    <option value="asuka">Asuka</option>
    <option value="mamimi">Mamimi</option>
    <option value="kanade">Kanade</option>
  </select>
  <button id="themeToggle" title="Đổi giao diện">
    <img id="themeIcon" src="icons/moon.svg" alt="Theme Icon" width="16" height="20">
  </button>
</div>
  
<header>
    <h1>All That Anime</h1>

    <div id="anime-counts" style="margin-top: 10px; font-size: 1em;"></div><div class="tabs">

  <button data-category="TV Series">TV Series</button>
  <button data-category="Movies">Movies</button>
  <button data-category="NSFW">NSFW</button>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Tìm kiếm anime...">
</div>

<div class="sort-box">
  <button id="sortBtn" class="themed-button">Sắp xếp A → Z</button>
</div>

<main class="anime-list" id="animeList">
</main>

<button id="toTopBtn" class="themed-button" title="Về đầu trang">⬆</button>

<script src="js/index.js" defer></script>
</body>

</html>
